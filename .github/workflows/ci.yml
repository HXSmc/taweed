name: CI

# CI: lint + typecheck + unit, integration (Postgres), and E2E (Playwright +
# a11y). The KSA-region cloud env (in-Kingdom infra + NPHIES creds) is deferred to
# the DEPLOY phase — see docs/02_product_build_plan.md §4/§10.

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm typecheck:web
      - run: pnpm test

  integration:
    name: Integration (parse → normalize → insert + RLS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taweed
          POSTGRES_PASSWORD: taweed
          POSTGRES_DB: taweed
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taweed -d taweed"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgres://taweed:taweed@localhost:5432/taweed
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:int

  e2e:
    name: E2E + a11y (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taweed
          POSTGRES_PASSWORD: taweed
          POSTGRES_DB: taweed
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taweed -d taweed"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgres://taweed:taweed@localhost:5432/taweed
      TAWEED_ENABLE_DEV_AUTH: "1"
      AUTH_SECRET: ci-insecure-secret
      # next.config.mjs's headers() is resolved once at `next build` into
      # .next/routes-manifest.json, not re-evaluated per-request by `next
      # start` — so this must be set here (job-wide, covers the "Build the
      # app" step below), not just in playwright.config.ts's webServer.env.
      TAWEED_HTTP_ONLY_E2E: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Seed the database
        run: pnpm --filter @taweed/web seed
      - name: Install Playwright browsers
        run: pnpm --filter @taweed/web exec playwright install --with-deps chromium firefox webkit
      - name: Build the app
        run: pnpm --filter @taweed/web build
      - name: Run E2E + a11y
        run: pnpm --filter @taweed/web test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
