services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: taweed
      POSTGRES_PASSWORD: taweed
      POSTGRES_DB: taweed
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taweed -d taweed"]
      interval: 2s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://taweed:taweed@postgres:5432/taweed
      # Demo/dev mode only — passwordless seeded-account login (same opt-in
      # the E2E suite uses, see apps/web/lib/auth.ts). Never set this in a
      # real deployment.
      TAWEED_ENABLE_DEV_AUTH: "1"
      AUTH_SECRET: dev-insecure-secret-change-me
      # packages/db/test/migrate.ts refuses its destructive
      # drop-schema-and-reseed unless DATABASE_URL's host is loopback
      # (localhost/127.0.0.1/::1). "postgres" here is the compose service's
      # internal DNS name for our OWN ephemeral, isolated container — genuinely
      # local despite the non-loopback hostname — so this override is safe in
      # this file specifically. Never set it against a real/shared database.
      TAWEED_ALLOW_DESTRUCTIVE_MIGRATE: "1"
      # Optional: AI features (AI-1 through AI-4). ALL FOUR of the lines below
      # must be uncommented for a given feature to actually turn on — the
      # master switch alone enables nothing (packages/ai/src/config.ts
      # isFeatureEnabled() requires TAWEED_AI_ENABLED=true AND that feature's
      # own flag=true). See docs/review.md "Testing the AI features" for the
      # full walkthrough of what each one does and how to test it.
      # ANTHROPIC_API_KEY: "sk-ant-..."
      # TAWEED_AI_ENABLED: "true"
      # TAWEED_AI_EXPLAIN_ENABLED: "true"       # AI-1: "Explain this rule" on the Scrubber page
      # TAWEED_AI_APPEAL_ENABLED: "true"        # AI-2: "Suggest with AI" on the Appeals page
      # TAWEED_AI_AUTHOR_RULE_ENABLED: "true"   # AI-3: "Draft rule" on the Settings > Author tab
      # TAWEED_AI_EXTRACT_EOB_ENABLED: "true"   # AI-4: EOB/PDF upload on the Ingest page

