services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: taweed
      POSTGRES_PASSWORD: taweed
      POSTGRES_DB: taweed
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taweed -d taweed"]
      interval: 2s
      timeout: 5s
      retries: 15
