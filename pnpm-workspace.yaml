packages:
  - "apps/*"
  - "packages/*"
  - "test/synthetic-fhir"
  - "test/synthetic-eob"

# pnpm 11's new supply-chain gate: postinstall/build scripts are blocked by
# default unless explicitly allowed here. All four are trusted, well-known
# packages that need a native build step to function at all (not optional
# tooling) — esbuild's own binary, @swc/core and @parcel/watcher's native
# bindings (transitive via vitest/eslint tooling), sharp's native image
# bindings (transitive, unused directly by this app).
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  sharp: true

# Moved here from package.json's "pnpm.overrides" field — pnpm 11 no longer
# reads the "pnpm" key in package.json at all (silently ignored, no warning).
# These pin CVE remediations on transitive deps from the 2026-07 audit sweep
# (docs/deps.md) — dropping them silently would revert to vulnerable
# transitive versions, so this move is security-load-bearing, not cosmetic.
overrides:
  next>postcss: "^8.5.10"
  "@esbuild-kit/core-utils>esbuild": "^0.25.4"
  vitest>vite: "^6.4.3"
  vite-node>vite: "^6.4.3"
  "@vitest/mocker>vite": "^6.4.3"
  # GHSA-3jxr-9vmj-r5cp (brace-expansion DoS), 2026-07-20 audit failure —
  # dev-only via eslint + @vitest/coverage-v8's minimatch chains.
  brace-expansion: "^2.1.2"
  # GHSA-f88m-g3jw-g9cj (sharp libvips CVE-2026-33327/33328/35590/35591),
  # 2026-07-21 audit failure — transitive via next/next-auth/geist>sharp.
  sharp: "^0.35.3"
  # GHSA-w5hq-g745-h8pq (uuid buffer bounds check), 2026-07-24 audit —
  # transitive via new devDependency autocannon>hyperid@^3.0.0>uuid. hyperid
  # 4.x dropped the uuid dependency entirely (verified via `npm view
  # hyperid@4.0.0 dependencies`) — override straight to the fixed major
  # rather than pin uuid directly, since hyperid's own id-generation API is
  # the only thing autocannon touches and stayed stable across the bump
  # (verified: scripts/load-test.ts ran clean against real production traffic
  # after this override).
  "autocannon>hyperid": "^4.0.0"
